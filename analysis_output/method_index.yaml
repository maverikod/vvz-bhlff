          description: Параметр 2
          type: Any
        frequency:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_gravitational_waves:
      description: "Compute gravitational waves from VBP envelope dynamics.\n\nPhysical\
        \ Meaning:\n    Calculates gravitational waves generated by the\n    VBP envelope\
        \ dynamics, including strain tensor,\n    amplitude, and frequency spectrum.\
