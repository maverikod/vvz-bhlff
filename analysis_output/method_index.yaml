        \ Meaning:\n    Computes the envelope a(x,φ,t) of the Base High-Frequency\
        \ Field\n    in 7D space-time M₇ = ℝ³ₓ × \U0001D54B³_φ × ℝₜ that modulates\
        \ the high-frequency carrier.\n    The envelope is a vector of three U(1)\
        \ phase components Θ_a (a=1..3).\n\nMathematical Foundation:\n    Solves ∇·(κ(|a|)∇a)\
        \ + k₀²χ(|a|)a = s(x,φ,t) for the envelope a(x,φ,t)\n    where a is a vector\
        \ of three U(1) phase components in 7D space-time.\n\nArgs:\n    source (np.ndarray):\
        \ Source term s(x,φ,t) in 7D space-time.\n        Represents external excitations\
        \ or initial conditions in M₇.\n\nReturns:\n    np.ndarray: BVP envelope a(x,φ,t)\
        \ in 7D space-time.\n        Represents the envelope modulation of the high-frequency\
        \ carrier\n        as a vector of three U(1) phase components.\n\nRaises:\n\
        \    ValueError: If source has incompatible shape with 7D domain."
      parameters:
