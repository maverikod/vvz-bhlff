    embedded_rk_step:
      description: "Perform embedded Runge-Kutta step with full error estimation.\n\
        \nPhysical Meaning:\n    Uses embedded Runge-Kutta method to compute both\
        \ fourth-order\n    accurate solution and fifth-order error estimate for adaptive\
        \ control.\n    Implements the full Dormand-Prince RK4(5) method with proper\n\
        \    Butcher tableau coefficients.\n\nMathematical Foundation:\n    Implements\
        \ embedded Dormand-Prince RK4(5) method:\n    - k1 = dt * f(t, y)\n    - k2\
        \ = dt * f(t + c2*dt, y + a21*k1)\n    - k3 = dt * f(t + c3*dt, y + a31*k1\
        \ + a32*k2)\n    - k4 = dt * f(t + c4*dt, y + a41*k1 + a42*k2 + a43*k3)\n\
        \    - k5 = dt * f(t + c5*dt, y + a51*k1 + a52*k2 + a53*k3 + a54*k4)\n   \
        \ - k6 = dt * f(t + c6*dt, y + a61*k1 + a62*k2 + a63*k3 + a64*k4 + a65*k5)\n\
        \    - k7 = dt * f(t + c7*dt, y + a71*k1 + a72*k2 + a73*k3 + a74*k4 + a75*k5\
        \ + a76*k6)\n    - y4 = y + b1*k1 + b2*k2 + b3*k3 + b4*k4 + b5*k5 + b6*k6\
        \ + b7*k7  (4th order)\n    - y5 = y + b1^*k1 + b2^*k2 + b3^*k3 + b4^*k4 +\
        \ b5^*k5 + b6^*k6 + b7^*k7  (5th order)\n    - error = |y5 - y4|"
      parameters:
        compute_rhs:
          description: Параметр 5
          type: Any
        dt:
          description: Параметр 4
          type: Any
        field:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 3
          type: Any
      returns: None
