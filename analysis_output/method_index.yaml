          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    set_relaxation_times:
      description: "Set relaxation times for memory variables.\n\nPhysical Meaning:\n\
        \    Configures the relaxation times τⱼ for each memory variable,\n    controlling\
        \ how quickly each variable forgets past information.\n\nArgs:\n    taus (List[float]):\
        \ Relaxation times for each memory variable."
      parameters:
