    get_memory_info:
      description: "Get memory information and usage statistics.\n\nPhysical Meaning:\n\
        \    Returns current memory usage statistics for monitoring\n    and debugging\
        \ purposes.\n\nReturns:\n    Dict[str, Any]: Memory information including:\n\
        \        - current_usage: Current memory usage\n        - domain_estimate:\
        \ Estimated memory for current domain\n        - threshold: Memory threshold\
        \ setting\n        - is_safe: Whether current usage is safe"
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_nonlinear_coefficients:
      description: "Get nonlinear coefficients for given envelope.\n\nPhysical Meaning:\n\
        \    Computes and returns the nonlinear coefficients κ(|a|) and χ(|a|)\n \
        \   for the given envelope field, showing how they depend on\n    local field\
        \ amplitude.\n\nMathematical Foundation:\n    Returns κ(|a|) = κ₀ + κ₂|a|²\
        \ and χ(|a|) = χ' + iχ''(|a|)\n    computed from the current envelope field.\n\
        \nArgs:\n    envelope (np.ndarray): Envelope field a(x,φ,t).\n\nReturns:\n\
        \    Dict[str, np.ndarray]: Nonlinear coefficients:\n        - kappa: Nonlinear\
        \ stiffness κ(|a|)\n        - chi_real: Real part of susceptibility χ'(|a|)\n\
        \        - chi_imag: Imaginary part of susceptibility χ''(|a|)"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_parameters:
      description: "Get envelope equation parameters.\n\nPhysical Meaning:\n    Returns\
        \ the current base parameters for the envelope equation.\n    Note: Actual\
        \ coefficients are computed dynamically as functions\n    of field amplitude.\n\
        \nReturns:\n    Dict[str, float]: Base envelope equation parameters."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    solve_envelope:
      decorators:
      - <ast.Call object at 0x7eb84e0e0fd0>
      description: "Solve 7D BVP envelope equation.\n\nPhysical Meaning:\n    Computes\
        \ the envelope a(x,φ,t) of the Base High-Frequency Field\n    in 7D space-time\
        \ M₇ = ℝ³ₓ × \U0001D54B³_φ × ℝₜ that modulates the high-frequency carrier.\n\
        \nMathematical Foundation:\n    Solves ∇·(κ(|a|)∇a) + k₀²χ(|a|)a = s(x,φ,t)\
        \ for the envelope a(x,φ,t)\n    where ∇ includes gradients in all 7 dimensions\
        \ (3 spatial + 3 phase + 1 temporal).\n\nArgs:\n    source (np.ndarray): Source\
        \ term s(x,φ,t) in 7D space-time.\n        Represents external excitations\
        \ or initial conditions in M₇.\n\nReturns:\n    np.ndarray: BVP envelope a(x,φ,t)\
        \ in 7D space-time.\n        Represents the envelope modulation of the high-frequency\
        \ carrier.\n\nRaises:\n    ValueError: If source has incompatible shape with\
        \ 7D domain."
      parameters:
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 2
          type: Any
      returns: None
    solve_envelope_linearized:
      decorators:
      - <ast.Call object at 0x7eb84deb80d0>
      description: "Solve linearized 7D BVP envelope equation.\n\nPhysical Meaning:\n\
        \    Solves the linearized version of the envelope equation\n    ∇·(κ₀∇a)\
        \ + k₀²χ'a = s(x,φ,t) for initial guess generation.\n\nMathematical Foundation:\n\
        \    Solves the linearized equation using spectral methods\n    for efficient\
        \ computation of initial guess.\n\nArgs:\n    source (np.ndarray): Source\
        \ term s(x,φ,t) in 7D space-time.\n\nReturns:\n    np.ndarray: Linearized\
        \ envelope solution a(x,φ,t)."
      parameters:
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 2
          type: Any
      returns: None
    validate_solution:
      description: "Validate envelope equation solution.\n\nPhysical Meaning:\n  \
        \  Validates that the solution satisfies the envelope equation\n    within\
        \ the specified tolerance by computing the residual.\n\nMathematical Foundation:\n\
        \    Computes residual R = ∇·(κ(|a|)∇a) + k₀²χ(|a|)a - s\n    and checks that\
        \ ||R|| / ||s|| < tolerance.\n\nArgs:\n    solution (np.ndarray): Envelope\
        \ solution a(x,φ,t).\n    source (np.ndarray): Source term s(x,φ,t).\n   \
        \ tolerance (float): Relative tolerance for validation.\n\nReturns:\n    Dict[str,\
        \ Any]: Validation results including:\n        - is_valid: Whether solution\
        \ is valid\n        - residual_norm: L2 norm of residual\n        - relative_error:\
        \ Relative error\n        - max_error: Maximum error"
      parameters:
        self:
          description: Параметр 1
          type: Any
        solution:
          description: Параметр 2
          type: Any
        source:
          description: Параметр 3
          type: Any
        tolerance:
          description: Параметр 4
          type: Any
      returns: None
