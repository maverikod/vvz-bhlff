      description: "Calculate energy of the field configuration.\n\nPhysical Meaning:\n\
        \    Computes the total energy of the phase field configuration,\n    which\
        \ is used for quench detection.\n\nMathematical Foundation:\n    Energy =\
        \ ∫ |a(x)|² dx\n    Approximated as: Energy ≈ Σ |a(x)|² Δx\n\nArgs:\n    field\
        \ (np.ndarray): Field configuration.\n\nReturns:\n    float: Total energy\
        \ of the field."
      parameters:
        field:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    clear_history:
      description: Clear quench event history.
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    detect_quench:
      description: "Detect quench events in the field.\n\nPhysical Meaning:\n    Analyzes\
        \ the current field configuration for signs of energy\n    dumping or sudden\
        \ changes that may indicate quench events.\n\nMathematical Foundation:\n \
        \   Checks multiple criteria:\n    1. Energy change: |E(t) - E(t-1)| > energy_threshold\n\
        \    2. Rate of change: |∂E/∂t| > rate_threshold\n    3. Field magnitude:\
        \ max|a(x,t)| > magnitude_threshold\n\nArgs:\n    field (np.ndarray): Current\
        \ field configuration.\n    time (float): Current time.\n\nReturns:\n    bool:\
        \ True if quench detected, False otherwise."
      parameters:
