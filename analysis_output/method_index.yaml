    project_field_windows:
      description: "Project fields onto different frequency-amplitude windows.\n\n\
        Physical Meaning:\n    Separates the unified phase field into different\n\
        \    interaction regimes based on frequency and amplitude\n    characteristics\
        \ corresponding to electromagnetic,\n    strong, and weak interactions.\n\n\
        Mathematical Foundation:\n    Uses frequency-domain filtering to separate\
        \ different\n    interaction regimes:\n    - EM: P_EM[a] = FFT⁻¹[FFT(a) ×\
        \ H_EM(ω)]\n    - Strong: P_STRONG[a] = FFT⁻¹[FFT(a) × H_STRONG(ω)]\n    -\
        \ Weak: P_WEAK[a] = FFT⁻¹[FFT(a) × H_WEAK(ω)]\n\nArgs:\n    field (np.ndarray):\
        \ Input field\n    window_params (Dict): Window parameters for each interaction\
        \ type\n\nReturns:\n    Dict: Projected fields and signatures including:\n\
