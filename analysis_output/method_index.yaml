        \ Statistics about detected quench events."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    set_thresholds:
      description: "Update detection thresholds.\n\nPhysical Meaning:\n    Adjusts\
        \ the sensitivity of quench detection by modifying\n    the thresholds for\
        \ energy change, rate of change, and\n    field magnitude.\n\nArgs:\n    energy_threshold\
        \ (Optional[float]): New energy change threshold.\n    rate_threshold (Optional[float]):\
