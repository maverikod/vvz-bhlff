          description: Параметр 1
          type: Any
      returns: None
    _analyze_formation:
      description: "Analyze defect formation mechanisms.\n\nPhysical Meaning:\n  \
        \  Analyzes the mechanisms by which defects form in the BVP envelope,\n  \
        \  including nucleation processes and formation probabilities.\n\nMathematical\
        \ Foundation:\n    Formation probability is related to:\n    - Local field\
        \ strength\n    - Phase coherence\n    - Energy density gradients\n\nArgs:\n\
        \    envelope (np.ndarray): BVP envelope field.\n\nReturns:\n    Dict[str,\
        \ Any]: Formation analysis including:\n        - formation_probability: Probability\
        \ of defect formation\n        - formation_rate: Rate of defect formation\n\
        \        - formation_stability: Stability of formed defects"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
