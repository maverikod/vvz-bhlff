        \ (∂a/∂x, ∂a/∂y, ∂a/∂z).\n\nReturns:\n    Tuple[np.ndarray, ...]: Field gradient\
        \ components."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
