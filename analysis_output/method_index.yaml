        \ index, which quantifies the\n    overlap of non-zero regions.\n\nMathematical\
        \ Foundation:\n    Jaccard index: J(A,B) = |A ∩ B| / |A ∪ B|\n    where A\
        \ and B are binary frame maps.\n\nArgs:\n    map1 (np.ndarray): First frame\
        \ map\n    map2 (np.ndarray): Second frame map\n\nReturns:\n    float: Jaccard\
        \ index (0-1)"
