    compute_radiation_losses:
      description: "Compute EM/weak radiation and losses in 7D space-time.\n\nPhysical\
        \ Meaning:\n    Computes the EM/weak radiation and losses in 7D space-time\
        \ M₇,\n    representing the energy radiated away from the system through\n\
        \    electromagnetic and weak interactions. This includes contributions\n\
        \    from all 7 dimensions according to the BVP theory.\n\nMathematical Foundation:\n\
        \    The radiation losses in 7D are computed as:\n    P_rad = ∫_∂Ω₇ σ|E|²\
        \ dS₇ + ∫_∂Ω₇ σ_weak|W|² dS₇\n    where σ and σ_weak are the electromagnetic\
        \ and weak conductivities,\n    E and W are the electromagnetic and weak fields\
        \ derived from\n    the 7D BVP envelope, and the integral is over the 7D boundary.\n\
        \nArgs:\n    envelope (np.ndarray): 7D envelope field with shape\n       \
        \ (N_x, N_y, N_z, N_φ₁, N_φ₂, N_φ₃, N_t)\n\nReturns:\n    float: Computed\
        \ EM/weak radiation losses in 7D space-time."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_reflection:
      description: "Compute reflection component in 7D space-time.\n\nPhysical Meaning:\n\
        \    Computes the reflection component in 7D space-time M₇,\n    representing\
        \ the energy reflected back from the boundaries\n    due to impedance mismatch\
        \ and boundary conditions. This includes\n    reflections from both spatial\
        \ and phase boundaries.\n\nMathematical Foundation:\n    The reflection in\
        \ 7D is computed as:\n    R = ∫_∂Ω₇ |r|²|E_inc|² dS₇\n    where r is the reflection\
        \ coefficient, E_inc is the\n    incident field amplitude, and the integral\
        \ is over the 7D boundary.\n\nArgs:\n    envelope (np.ndarray): 7D envelope\
        \ field with shape\n        (N_x, N_y, N_z, N_φ₁, N_φ₂, N_φ₃, N_t)\n\nReturns:\n\
        \    float: Computed reflection component in 7D space-time."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
