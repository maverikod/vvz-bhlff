        \    Laplacian operator, which is essential for efficient\n    solution of\
        \ the equation in spectral space."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_solver_info:
      description: "Get solver information.\n\nReturns:\n    Dict[str, Any]: Solver\
        \ information."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    solve_envelope:
      description: "Solve the envelope equation.\n\nPhysical Meaning:\n    Solves\
        \ the envelope equation for the 7D phase field,\n    representing the evolution\
        \ of the field envelope\n    in 7D space-time.\n\nArgs:\n    source (np.ndarray):\
        \ Source term for envelope equation.\n\nReturns:\n    np.ndarray: Envelope\
        \ solution field."
      parameters:
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 2
          type: Any
      returns: None
    solve_stationary:
      description: "Solve the stationary fractional Laplacian equation.\n\nPhysical\
        \ Meaning:\n    Solves the stationary fractional Laplacian equation\n    L_β\
        \ a = s in spectral space, representing the steady-state\n    solution of\
        \ the field evolution.\n\nMathematical Foundation:\n    Solves L_β a = s in\
        \ spectral space:\n    â(k) = ŝ(k) / (μ|k|^(2β) + λ)\n    where k is the wave\
        \ vector and |k| is its magnitude.\n\nArgs:\n    source (np.ndarray): Source\
        \ term s(x) in real space.\n        Represents external excitations or initial\
        \ conditions\n        that drive the field evolution.\n\nReturns:\n    np.ndarray:\
        \ Solution field a(x) in real space.\n        Represents the field configuration\
        \ that\n        satisfies the equation and describes the spatial\n       \
        \ distribution of field values.\n\nRaises:\n    ValueError: If source has\
        \ incompatible shape with domain.\n    RuntimeError: If FFT operations fail."
      parameters:
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 2
          type: Any
      returns: None
