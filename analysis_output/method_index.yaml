      description: "Get field Laplacian Δa(x).\n\nPhysical Meaning:\n    Computes\
        \ the Laplacian of the phase field, representing\n    the second-order spatial\
        \ derivatives.\n\nMathematical Foundation:\n    Laplacian is Δa = ∂²a/∂x²\
        \ + ∂²a/∂y² + ∂²a/∂z².\n\nReturns:\n    np.ndarray: Field Laplacian Δa(x)."
