  SphericalLayer:
    __init__:
      description: "Initialize spherical layer.\n\nPhysical Meaning:\n    Sets up\
        \ the spherical layer with specified inner and outer\n    radii, center position,\
        \ and angular resolution.\n\nArgs:\n    inner_radius (float): Inner radius\
        \ of the spherical layer.\n    outer_radius (float): Outer radius of the spherical\
        \ layer.\n    center (Tuple[float, float, float]): Center coordinates.\n \
        \   resolution (int): Angular resolution for spherical coordinates.\n\nRaises:\n\
        \    ValueError: If inner_radius >= outer_radius."
      parameters:
        center:
          description: Параметр 4
          type: Any
        inner_radius:
          description: Параметр 2
          type: Any
        outer_radius:
          description: Параметр 3
          type: Any
        resolution:
          description: Параметр 5
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    __repr__:
      description: String representation of the spherical layer.
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: str
    contains_point:
      description: "Check if point is inside the spherical layer.\n\nPhysical Meaning:\n\
        \    Determines whether a given point lies within the\n    spherical layer\
        \ boundaries.\n\nMathematical Foundation:\n    Point (x, y, z) is inside if:\n\
        \    inner_radius² ≤ (x-cx)² + (y-cy)² + (z-cz)² ≤ outer_radius²\n\nArgs:\n\
        \    x (float): X coordinate of the point.\n    y (float): Y coordinate of\
        \ the point.\n    z (float): Z coordinate of the point.\n\nReturns:\n    bool:\
        \ True if point is inside the layer."
      parameters:
        self:
          description: Параметр 1
          type: Any
        x:
          description: Параметр 2
          type: Any
        y:
          description: Параметр 3
          type: Any
        z:
          description: Параметр 4
          type: Any
      returns: bool
    get_cartesian_coordinates:
      description: "Get Cartesian coordinates for the layer.\n\nPhysical Meaning:\n\
        \    Converts spherical coordinates to Cartesian coordinates,\n    providing\
        \ the standard coordinate system for computations.\n\nMathematical Foundation:\n\
        \    Converts (r, θ, φ) to (x, y, z):\n    x = r sin(θ) cos(φ) + center_x\n\
        \    y = r sin(θ) sin(φ) + center_y\n    z = r cos(θ) + center_z\n\nReturns:\n\
        \    Tuple[np.ndarray, np.ndarray, np.ndarray]: (x, y, z) coordinate arrays."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_center:
      description: "Get center coordinates of the layer.\n\nPhysical Meaning:\n  \
        \  Returns the center coordinates of the spherical layer.\n\nReturns:\n  \
        \  Tuple[float, float, float]: Center coordinates (x, y, z)."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_coordinates:
      description: "Get spherical coordinates for the layer.\n\nPhysical Meaning:\n\
        \    Generates spherical coordinates (r, θ, φ) for the layer,\n    providing\
        \ the coordinate system for phase field calculations.\n\nMathematical Foundation:\n\
        \    Creates spherical coordinate grid:\n    - r ∈ [inner_radius, outer_radius]\n\
        \    - θ ∈ [0, π] (polar angle)\n    - φ ∈ [0, 2π] (azimuthal angle)\n\nReturns:\n\
        \    Tuple[np.ndarray, np.ndarray, np.ndarray]: (r, θ, φ) coordinate arrays."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_layer_thickness:
      description: "Get thickness of the spherical layer.\n\nPhysical Meaning:\n \
        \   Computes the radial thickness of the spherical layer,\n    representing\
        \ the distance between inner and outer boundaries.\n\nMathematical Foundation:\n\
        \    Thickness = outer_radius - inner_radius\n\nReturns:\n    float: Thickness\
        \ of the spherical layer."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: float
    get_radii:
      description: "Get inner and outer radii of the layer.\n\nPhysical Meaning:\n\
        \    Returns the inner and outer radii of the spherical layer.\n\nReturns:\n\
        \    Tuple[float, float]: (inner_radius, outer_radius)."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_surface_area:
      description: "Get surface areas of the layer boundaries.\n\nPhysical Meaning:\n\
        \    Computes the surface areas of the inner and outer\n    boundaries of\
        \ the spherical layer.\n\nMathematical Foundation:\n    Surface area of sphere:\
        \ A = 4πR²\n\nReturns:\n    Tuple[float, float]: (inner_surface_area, outer_surface_area)."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_volume:
      description: "Get volume of the spherical layer.\n\nPhysical Meaning:\n    Computes\
        \ the volume of the spherical layer, representing\n    the total volume enclosed\
        \ by the layer boundaries.\n\nMathematical Foundation:\n    Volume of spherical\
        \ layer: V = (4/3)π(R_outer³ - R_inner³)\n\nReturns:\n    float: Volume of\
        \ the spherical layer."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: float
