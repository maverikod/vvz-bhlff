          description: Параметр 3
          type: Any
        dy:
          description: Параметр 4
          type: Any
        dz:
          description: Параметр 5
          type: Any
        f_phi:
          description: Параметр 9
          type: Any
        gamma6:
          description: Параметр 12
          type: Any
        k0:
          description: Параметр 10
          type: Any
