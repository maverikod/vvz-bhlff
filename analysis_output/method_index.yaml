        amplitude:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_stiffness_derivative:
      description: "Compute derivative of stiffness with respect to amplitude.\n\n\
        Physical Meaning:\n    Computes dκ/d|a| = 2κ₂|a| for Newton-Raphson iterations.\n\
        \nMathematical Foundation:\n    dκ/d|a| = 2κ₂|a|\n\nArgs:\n    amplitude (np.ndarray):\
        \ Field amplitude |a|.\n\nReturns:\n    np.ndarray: Stiffness derivative dκ/d|a|."
      parameters:
        amplitude:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_susceptibility:
      description: "Compute nonlinear susceptibility χ(|a|) = χ' + iχ''(|a|).\n\n\
        Physical Meaning:\n    Computes the complex susceptibility that depends on\
        \ field amplitude,\n    representing the local response of the phase field\
        \ to external\n    excitations, including quench effects.\n\nMathematical\
        \ Foundation:\n    χ(|a|) = χ' + iχ''(|a|)\n    where χ' is the real part\
        \ and χ''(|a|) = χ''₀ + χ''₂|a|² is the imaginary part.\n\nArgs:\n    amplitude\
