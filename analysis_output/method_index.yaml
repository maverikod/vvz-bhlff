      description: "Get field energy density.\n\nPhysical Meaning:\n    Computes the\
        \ local energy density of the phase field,\n    representing the energy content\
        \ per unit volume.\n\nMathematical Foundation:\n    Energy density is proportional\
        \ to |∇a|² + |a|².\n\nReturns:\n    np.ndarray: Field energy density."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
