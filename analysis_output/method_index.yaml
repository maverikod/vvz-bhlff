  DefectInteractions:
    __init__:
      description: "Initialize defect interactions calculator.\n\nPhysical Meaning:\n\
        \    Sets up the computational framework for defect interactions\n    including\
        \ Green functions, interaction potentials, and\n    annihilation processes.\n\
        \nArgs:\n    domain: Computational domain\n    physics_params: Physical parameters"
      parameters:
        domain:
          description: Параметр 2
          type: Any
        physics_params:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _compute_annihilation_energy:
      description: "Compute energy released during annihilation using fractional Green\
        \ function.\n\nPhysical Meaning:\n    Calculates the energy released when\
        \ a defect-antidefect\n    pair annihilates, based on their charges and separation\n\
        \    using the fractional Green function G_β(r).\n\nMathematical Foundation:\n\
        \    Energy scales with the fractional Green function value\n    at the separation\
        \ distance: E ∝ |q₁q₂| G_β(r)."
      parameters:
        charge1:
          description: Параметр 2
          type: Any
        charge2:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
        separation:
          description: Параметр 4
          type: Any
      returns: float
    _compute_energy_release_rate:
      description: "Compute rate of energy release during annihilation.\n\nPhysical\
        \ Meaning:\n    Calculates how quickly energy is released during\n    the\
        \ annihilation process."
      parameters:
        annihilation_energy:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    _compute_fractional_green_normalization:
      description: "Compute normalization constant for fractional Green function.\n\
        \nPhysical Meaning:\n    Calculates the normalization constant C_β for the\
        \ fractional\n    Green function G_β such that (-Δ)^β G_β = δ in R³.\n\nMathematical\
        \ Foundation:\n    For 3D fractional Laplacian: C_β = Γ(3/2-β) / (2^(2β) π^(3/2)\
        \ Γ(β))\n    This ensures proper normalization of the fractional Green function.\n\
        \    The exact formula ensures that ∫ G_β(r) d³r = 1 and (-Δ)^β G_β = δ.\n\
        \nArgs:\n    beta: Fractional order parameter\n\nReturns:\n    Normalization\
        \ constant C_β"
      parameters:
        beta:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    _compute_green_function:
      description: "Compute fractional Green function and its gradient.\n\nPhysical\
        \ Meaning:\n    Calculates the fractional Green function G_β(r) and its gradient\n\
        \    for defect interactions. The Green function represents\n    the potential\
        \ due to a point source in fractional Laplacian theory.\n\nMathematical Foundation:\n\
        \    G_β(r) = C_β r^(2β-3) for 3D fractional Laplacian (-Δ)^β.\n    For β=1:\
        \ G_1(r) = 1/(4πr) (classical Coulomb).\n    For β<1: G_β(r) ∝ r^(2β-3) with\
        \ power-law tail.\n\nArgs:\n    r: Distance from source\n\nReturns:\n    Tuple\
        \ of (Green function value, gradient)"
      parameters:
        r:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _compute_pair_force:
      description: "Compute force between defect pair.\n\nPhysical Meaning:\n    Calculates\
        \ the force between two defects based on\n    their charges and separation.\n\
        \nMathematical Foundation:\n    F = -qᵢqⱼ ∇G(r) where G is the Green function.\n\
        \nArgs:\n    r_ij: Separation vector from defect i to defect j\n    r_magnitude:\
        \ Magnitude of separation\n    charge_i: Charge of defect i\n    charge_j:\
        \ Charge of defect j\n\nReturns:\n    Force vector on defect i due to defect\
        \ j"
      parameters:
        charge_i:
          description: Параметр 4
          type: Any
        charge_j:
          description: Параметр 5
          type: Any
        r_ij:
          description: Параметр 2
          type: Any
        r_magnitude:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _compute_relaxation_time:
      description: "Compute field relaxation time after annihilation.\n\nPhysical\
        \ Meaning:\n    Calculates the time required for the field to relax\n    to\
        \ its new configuration after defect annihilation."
      parameters:
        self:
          description: Параметр 1
          type: Any
        separation:
          description: Параметр 2
          type: Any
      returns: float
    _setup_interaction_parameters:
      description: "Setup parameters for defect interactions.\n\nPhysical Meaning:\n\
        \    Initializes the physical parameters required for\n    defect interaction\
        \ calculations including interaction\n    strength, range, and Green function\
        \ parameters."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_interaction_forces:
      description: "Compute interaction forces between defects.\n\nPhysical Meaning:\n\
        \    Calculates the forces acting on each defect due to\n    interactions\
        \ with all other defects in the system.\n\nMathematical Foundation:\n    Fᵢ\
        \ = -∇ᵢ Σⱼ qᵢqⱼ G(rᵢⱼ) where G is the Green function\n    and the sum is over\
        \ all other defects j ≠ i.\n\nArgs:\n    positions: List of defect positions\n\
        \    charges: List of defect charges\n\nReturns:\n    List of force vectors\
        \ for each defect"
      parameters:
        charges:
          description: Параметр 3
          type: Any
        positions:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_interaction_potential:
      description: "Compute total interaction potential energy.\n\nPhysical Meaning:\n\
        \    Calculates the total potential energy of the defect\n    system due to\
        \ all pairwise interactions.\n\nMathematical Foundation:\n    U = (1/2) Σᵢⱼ\
        \ qᵢqⱼ G(rᵢⱼ) where the factor 1/2 avoids\n    double counting.\n\nArgs:\n\
        \    positions: List of defect positions\n    charges: List of defect charges\n\
        \nReturns:\n    Total interaction potential energy"
      parameters:
        charges:
          description: Параметр 3
          type: Any
        positions:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    simulate_defect_annihilation:
      description: "Simulate annihilation of defect-antidefect pair.\n\nPhysical Meaning:\n\
        \    Models the process where a defect and antidefect approach\n    and annihilate,\
        \ releasing energy and creating topological\n    transitions in the field.\n\
        \nMathematical Foundation:\n    Annihilation occurs when defects of opposite\
        \ charge\n    approach within a critical distance, leading to\n    energy\
        \ release and field relaxation.\n\nArgs:\n    defect_pair: Indices of defect\
        \ and antidefect\n    positions: Current defect positions\n    charges: Current\
        \ defect charges\n\nReturns:\n    Dictionary containing annihilation results"
      parameters:
        charges:
          description: Параметр 4
          type: Any
        defect_pair:
          description: Параметр 2
          type: Any
        positions:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
