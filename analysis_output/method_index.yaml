        \ error analysis.\n\nMathematical Foundation:\n    Residual is r = L_β a -\
        \ s where L_β is the fractional\n    Riesz operator applied to the field a.\n\
        \nArgs:\n    field (np.ndarray): Field configuration a(x).\n    source (np.ndarray):\
