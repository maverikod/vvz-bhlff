      description: String representation of envelope solver.
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: str
    _setup_parameters:
      description: "Setup envelope equation parameters.\n\nPhysical Meaning:\n   \
        \ Initializes the base physical parameters for the envelope equation\n   \
        \ from the constants instance. These are used as base values for\n    computing\
        \ nonlinear coefficients that depend on field amplitude."
