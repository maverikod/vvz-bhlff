      description: "Compute transmission matrix for single layer.\n\nPhysical Meaning:\n\
        \    Computes the 2x2 transmission matrix for a single\n    resonator layer\
        \ at frequency ω.\n\nMathematical Foundation:\n    For a layer with thickness\
        \ Δr and wave number k:\n    T = [cos(kΔr)  (1/k)sin(kΔr); -k sin(kΔr)  cos(kΔr)]"
      parameters:
        frequency:
          description: Параметр 3
          type: Any
        layer:
          description: Параметр 2
