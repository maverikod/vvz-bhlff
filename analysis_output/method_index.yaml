        \ + β₄(ΔΘ)² + γ₆|∇Θ|⁶\n\nArgs:\n    a (np.ndarray): 7D field array.\n    dx,\
        \ dy, dz (float): Spatial differentials.\n    dphi1, dphi2, dphi3 (float):\
        \ Phase differentials.\n    f_phi (float): Phase field constant.\n    k0 (float):\
        \ Wave number.\n    beta4 (float): Fourth-order coefficient.\n    gamma6 (float):\
        \ Sixth-order coefficient.\n\nReturns:\n    np.ndarray: 7D energy density\
        \ array."
      parameters:
        a:
          description: Параметр 2
          type: Any
        beta4:
          description: Параметр 11
          type: Any
        dphi1:
          description: Параметр 6
          type: Any
        dphi2:
          description: Параметр 7
          type: Any
        dphi3:
          description: Параметр 8
          type: Any
