    crank_nicolson_step:
      description: "Crank-Nicolson step.\n\nPhysical Meaning:\n    Implements Crank-Nicolson\
        \ time integration for BVP-modulated\n    evolution with second-order accuracy\
        \ and improved stability.\n\nMathematical Foundation:\n    Crank-Nicolson\
        \ scheme:\n    a_new = a + dt/2 * (F(a, t) + F(a_new, t + dt))\n\nArgs:\n\
        \    field (np.ndarray): Current field configuration.\n    dt (float): Time\
        \ step size.\n    evolution_func: Function computing evolution terms.\n\n\
        Returns:\n    np.ndarray: Field at next time step."
      parameters:
        dt:
          description: Параметр 3
          type: Any
        evolution_func:
          description: Параметр 4
          type: Any
        field:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
