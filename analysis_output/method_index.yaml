          type: Any
        num_memory_vars:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    __repr__:
      description: String representation of memory kernel.
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: str
    _setup_memory_system:
      description: "Setup memory system with default parameters.\n\nPhysical Meaning:\n\
        \    Initializes memory variables with default relaxation times\n    and coupling\
        \ strengths for typical 7D phase field dynamics."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    _validate_passivity:
      description: "Validate PASS-1: ReY(ω)≥0 for memory kernels below resonances.\n\
        \nPhysical Meaning:\n    Ensures that the memory kernel frequency response\
        \ Y(ω) has\n    non-negative real part below resonances, maintaining passivity\n\
        \    of the memory system.\n\nMathematical Foundation:\n    For Prony/fractional\
        \ memory kernels: Y(ω) = Σⱼ γⱼ/(1 + iωτⱼ)\n    Passivity requires ReY(ω) =\
        \ Σⱼ γⱼ/(1 + ω²τⱼ²) ≥ 0 for all ω"
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    apply:
      description: "Apply memory kernel effects to field.\n\nPhysical Meaning:\n \
        \   Applies the combined effect of all memory variables to the\n    current\
        \ field configuration, representing non-local temporal\n    influences from\
        \ past configurations.\n\nMathematical Foundation:\n    Returns: field + ∑ⱼ\
        \ γⱼ mⱼ\n    where γⱼ are coupling strengths and mⱼ are memory variables.\n\
        \nArgs:\n    field (np.ndarray): Current field configuration.\n    time (float):\
        \ Current time.\n\nReturns:\n    np.ndarray: Field with memory kernel effects\
        \ applied."
      parameters:
        field:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
        time:
          description: Параметр 3
          type: Any
      returns: None
    evolve:
      description: "Evolve memory variables.\n\nPhysical Meaning:\n    Updates memory\
        \ variables according to their evolution equation,\n    incorporating the\
        \ current field configuration as a source term.\n\nMathematical Foundation:\n\
        \    For each memory variable mⱼ:\n    ∂mⱼ/∂t + (1/τⱼ) mⱼ = field\n    Discretized\
        \ as: mⱼ^{n+1} = mⱼ^n + dt * (field - mⱼ^n/τⱼ)\n\nArgs:\n    field (np.ndarray):\
        \ Current field configuration.\n    dt (float): Time step size."
      parameters:
        dt:
          description: Параметр 3
          type: Any
        field:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    get_memory_contribution:
      description: "Get total memory contribution to field.\n\nPhysical Meaning:\n\
        \    Returns the combined contribution of all memory variables\n    to the\
        \ field evolution.\n\nReturns:\n    np.ndarray: Total memory contribution\
        \ ∑ⱼ γⱼ mⱼ."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    reset:
      description: "Reset memory variables to zero.\n\nPhysical Meaning:\n    Clears\
        \ all memory of past configurations, effectively\n    starting with a fresh\
        \ memory state."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    set_coupling_strengths:
      description: "Set coupling strengths for memory variables.\n\nPhysical Meaning:\n\
        \    Configures the coupling strengths γⱼ for each memory variable,\n    controlling\
        \ how strongly each variable influences the field.\n\nArgs:\n    gammas (List[float]):\
        \ Coupling strengths for each memory variable."
      parameters:
