        \ fourth-order Runge-Kutta time integration for\n    BVP-modulated evolution\
        \ with high accuracy.\n\nMathematical Foundation:\n    RK4 scheme:\n    k1\
        \ = dt * F(a, t)\n    k2 = dt * F(a + k1/2, t + dt/2)\n    k3 = dt * F(a +\
        \ k2/2, t + dt/2)\n    k4 = dt * F(a + k3, t + dt)\n    a_new = a + (k1 +\
