      description: "Setup topological charge calculation for 7D U(1)^3 phase winding.\n\
        \nPhysical Meaning:\n    Initializes the calculation of topological charge\
        \ which represents\n    the baryon number of the soliton via U(1)^3 winding\
        \ over φ-coordinates.\n\nMathematical Foundation:\n    B = (1/8π²)∫_T³_φ dφ₁dφ₂dφ₃\
        \ ∇_φ·Θ(x,φ) for 7D phase field Θ(x,φ) ∈ T^3_φ\n    The classical SU(3) form\
        \ B = (1/24π²)∫ε^μνρσTr(L_ν L_ρ L_σ) is a\n    4D pedagogical limit, not the\
        \ core 7D construction."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    _setup_wzw_term:
      description: "Setup Wess-Zumino-Witten term for baryon number conservation.\n\
        \nPhysical Meaning:\n    Initializes the WZW term that ensures baryon number\
        \ conservation\n    and provides the correct quantum statistics for solitons.\n\
        \nMathematical Foundation:\n    WZW coefficient: (N_c/240π²)∫ε^μνρστTr(L_μ\
        \ L_ν L_ρ L_σ L_τ) d⁵x"
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    analyze_soliton_stability:
      description: "Analyze stability of soliton solution.\n\nPhysical Meaning:\n\
        \    Investigates the response of the soliton to small perturbations\n   \
        \ to determine if it represents a stable minimum of the energy\n    functional.\n\
        \nMathematical Foundation:\n    Computes the spectrum of the Hessian matrix\
        \ δ²E/δU² at the\n    soliton solution to identify unstable modes.\n\nArgs:\n\
        \    soliton: Soliton field configuration\n\nReturns:\n    Dict containing\
        \ stability analysis, unstable modes, frequencies"
      parameters:
        self:
          description: Параметр 1
          type: Any
        soliton:
          description: Параметр 2
          type: Any
      returns: None
    compute_soliton_energy:
      description: "Compute total energy of soliton configuration.\n\nPhysical Meaning:\n\
        \    Calculates the total energy of the soliton including kinetic,\n    Skyrme,\
        \ and WZW contributions.\n\nMathematical Foundation:\n    E = ∫[F₂²/2 Tr(L_M\
        \ L^M) + S₄/4 J₄[U] + S₆/6 J₆[U] + Γ_WZW[U]] dV\n\nArgs:\n    soliton: Soliton\
        \ field configuration\n\nReturns:\n    Total energy of the configuration"
      parameters:
        self:
          description: Параметр 1
          type: Any
        soliton:
          description: Параметр 2
          type: Any
      returns: float
    compute_topological_charge:
      description: "Compute topological charge of soliton via 7D U(1)^3 phase winding.\n\
        \nPhysical Meaning:\n    Calculates the baryon number B via U(1)^3 winding\
        \ over φ-coordinates\n    which represents the topological charge of the soliton\
        \ in 7D phase\n    field theory.\n\nMathematical Foundation:\n    B = (1/8π²)∫_T³_φ\
        \ dφ₁dφ₂dφ₃ ∇_φ·Θ(x,φ) for 7D phase field Θ(x,φ) ∈ T^3_φ\n    The classical\
        \ SU(3) form B = (1/24π²)∫ε^μνρσTr(L_ν L_ρ L_σ) is a\n    4D pedagogical limit,\
        \ not the core 7D construction.\n\nArgs:\n    soliton: Soliton field configuration\n\
        \nReturns:\n    Topological charge (baryon number)"
      parameters:
        self:
          description: Параметр 1
          type: Any
        soliton:
          description: Параметр 2
          type: Any
      returns: float
    find_soliton_solution:
      description: "Find soliton solution using iterative methods.\n\nPhysical Meaning:\n\
        \    Searches for stable localized field configurations that minimize\n  \
        \  the energy functional while preserving topological charge.\n\nMathematical\
        \ Foundation:\n    Solves the stationary equation δE/δU = 0 where E is the\
        \ energy\n    functional with Skyrme terms and WZW contribution.\n\nArgs:\n\
        \    initial_guess: Initial field configuration U(x)\n\nReturns:\n    Dict\
        \ containing solution, energy, topological charge, stability"
      parameters:
        initial_guess:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
