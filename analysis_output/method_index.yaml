  ResidualComputerBase:
    __init__:
      description: "Initialize residual computer base.\n\nPhysical Meaning:\n    Sets\
        \ up the base residual computer with the computational domain\n    and configuration\
        \ parameters or constants for computing residuals\n    of the 7D envelope\
        \ equation.\n\nArgs:\n    domain (Union[Domain, Domain7D]): Computational\
        \ domain.\n    config_or_constants (Union[Dict[str, Any], BVPConstants]):\n\
        \        Configuration parameters or BVP constants instance."
