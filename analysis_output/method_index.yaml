    _compute_envelope_admittance:
      description: "Compute envelope admittance from field properties.\n\nPhysical\
        \ Meaning:\n    Calculates admittance from envelope gradient and amplitude\n\
        \    using transmission line theory.\n\nMathematical Foundation:\n    Y =\
        \ (1/Z) * (∇A/A) where A is envelope amplitude.\n\nArgs:\n    envelope (np.ndarray):\
        \ BVP envelope.\n\nReturns:\n    float: Envelope admittance."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_radiation_losses:
      description: "Compute EM/weak radiation and losses.\n\nPhysical Meaning:\n \
        \   Calculates energy losses due to electromagnetic and\n    weak radiation\
        \ from the envelope using full field theory.\n\nMathematical Foundation:\n\
        \    Radiation losses include:\n    - EM radiation: P_EM = σ_EM * |A|² * ω²\
        \ / (8π²c²)\n    - Weak radiation: P_weak = σ_weak * |A|⁴ * ω⁴ / (16π⁴c⁴)\n\
        \    - Total: P_total = P_EM + P_weak\n\nArgs:\n    envelope (np.ndarray):\
        \ BVP envelope.\n\nReturns:\n    float: Radiation losses."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_reflection:
      description: "Compute reflection at boundaries.\n\nPhysical Meaning:\n    Calculates\
        \ energy reflection at boundaries due to\n    impedance mismatch using full\
        \ electromagnetic theory.\n\nMathematical Foundation:\n    Reflection coefficient:\
        \ R = |(Z_L - Z_0)/(Z_L + Z_0)|²\n    where Z_L is load impedance and Z_0\
        \ is characteristic impedance.\n    Reflected power: P_reflected = R * P_incident\n\
        \nArgs:\n    envelope (np.ndarray): BVP envelope.\n\nReturns:\n    float:\
        \ Reflected energy."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
