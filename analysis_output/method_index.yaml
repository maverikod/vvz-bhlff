  ResonanceStatistics:
    __init__:
      description: "Initialize resonance statistics analyzer.\n\nPhysical Meaning:\n\
        \    Sets up the statistics analyzer with BVP constants for\n    statistical\
        \ analysis of resonance properties.\n\nArgs:\n    constants (BVPConstants):\
        \ BVP constants instance."
      parameters:
        constants:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _calculate_correlation:
      description: "Calculate correlation between two quality factor sets.\n\nPhysical\
        \ Meaning:\n    Calculates the correlation coefficient between two sets\n\
        \    of quality factors to assess their relationship.\n\nMathematical Foundation:\n\
        \    ρ = Σ((Q₁ᵢ - μ₁)(Q₂ᵢ - μ₂)) / (n σ₁ σ₂)\n    where μ and σ are mean and\
        \ standard deviation.\n\nArgs:\n    qf1 (List[float]): First set of quality\
        \ factors.\n    qf2 (List[float]): Second set of quality factors.\n\nReturns:\n\
        \    float: Correlation coefficient."
      parameters:
        qf1:
          description: Параметр 2
          type: Any
        qf2:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    _calculate_kurtosis:
      description: "Calculate kurtosis of the distribution.\n\nPhysical Meaning:\n\
        \    Calculates the kurtosis (fourth moment) of the quality factor\n    distribution\
        \ to assess tail heaviness.\n\nMathematical Foundation:\n    Kurtosis = (1/n)\
        \ Σ ((x_i - μ) / σ)⁴ - 3\n    (excess kurtosis, where 3 is subtracted for\
        \ normal distribution)\n\nArgs:\n    data (np.ndarray): Data array.\n    mean\
        \ (float): Mean value.\n    std (float): Standard deviation.\n\nReturns:\n\
        \    float: Kurtosis value."
      parameters:
        data:
          description: Параметр 2
          type: Any
        mean:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
        std:
          description: Параметр 4
          type: Any
      returns: float
    _calculate_skewness:
      description: "Calculate skewness of the distribution.\n\nPhysical Meaning:\n\
        \    Calculates the skewness (third moment) of the quality factor\n    distribution\
        \ to assess asymmetry.\n\nMathematical Foundation:\n    Skewness = (1/n) Σ\
        \ ((x_i - μ) / σ)³\n\nArgs:\n    data (np.ndarray): Data array.\n    mean\
        \ (float): Mean value.\n    std (float): Standard deviation.\n\nReturns:\n\
        \    float: Skewness value."
      parameters:
        data:
          description: Параметр 2
          type: Any
        mean:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
        std:
          description: Параметр 4
          type: Any
      returns: float
    analyze_quality_factor_distribution:
      description: "Analyze quality factor distribution.\n\nPhysical Meaning:\n  \
        \  Analyzes the statistical distribution of quality factors\n    to understand\
        \ the variability and characteristics of\n    BVP impedance resonance properties.\n\
        \nMathematical Foundation:\n    Calculates statistical moments of the quality\
        \ factor distribution:\n    - Mean: μ = (1/n) Σ Q_i\n    - Standard deviation:\
        \ σ = √((1/n) Σ (Q_i - μ)²)\n    - Skewness: measure of asymmetry\n    - Kurtosis:\
        \ measure of tail heaviness\n\nArgs:\n    quality_factors (List[float]): List\
        \ of quality factors.\n\nReturns:\n    Dict[str, float]: Distribution statistics."
      parameters:
        quality_factors:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compare_quality_factors:
      description: "Compare quality factors between two sets of resonances.\n\nPhysical\
        \ Meaning:\n    Compares quality factors between two sets of resonances\n\
        \    to analyze differences in resonance characteristics and\n    identify\
        \ systematic variations in BVP impedance properties.\n\nMathematical Foundation:\n\
        \    Uses statistical methods to compare quality factor distributions:\n \
        \   - Mean difference: μ₁ - μ₂\n    - Standard deviation difference: √(σ₁²\
        \ + σ₂²)\n    - Correlation coefficient: ρ(Q₁, Q₂)\n    - Significance: |μ₁\
        \ - μ₂| / σ_diff\n\nArgs:\n    quality_factors_1 (List[float]): First set\
        \ of quality factors.\n    quality_factors_2 (List[float]): Second set of\
        \ quality factors.\n\nReturns:\n    Dict[str, float]: Comparison results."
      parameters:
        quality_factors_1:
          description: Параметр 2
          type: Any
        quality_factors_2:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
