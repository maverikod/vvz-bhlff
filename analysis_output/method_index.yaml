./bhlff/core/bvp/abstract_solver_core.py:
  AbstractSolverCore:
    __init__:
      description: "Initialize abstract solver core.\n\nPhysical Meaning:\n    Sets\
        \ up the base solver core with the computational domain\n    and configuration\
        \ parameters for solving the BVP equation.\n\nArgs:\n    domain (Domain):\
        \ Computational domain with grid information.\n    config (Dict[str, Any]):\
        \ Configuration parameters including:\n        - max_iterations: Maximum Newton-Raphson\
        \ iterations\n        - tolerance: Convergence tolerance\n        - damping_factor:\
        \ Damping factor for stability"
      parameters:
        config:
          description: Параметр 3
          type: Any
        domain:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    __repr__:
      description: String representation of solver core.
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: str
    compute_jacobian:
      description: "Compute Jacobian matrix for Newton-Raphson method.\n\nPhysical\
        \ Meaning:\n    Computes the Jacobian matrix J = ∂r/∂a of the residual\n \
        \   with respect to the envelope field.\n\nMathematical Foundation:\n    J_{ij}\
        \ = ∂r_i/∂a_j where r is the residual and a is the solution vector.\n\nArgs:\n\
        \    envelope (np.ndarray): Current envelope estimate a(x,φ,t).\n\nReturns:\n\
        \    np.ndarray: Jacobian matrix J."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_residual:
      description: "Compute residual of the BVP envelope equation.\n\nPhysical Meaning:\n\
        \    Computes the residual r = ∇·(κ(|a|)∇a) + k₀²χ(|a|)a - s(x,φ,t)\n    for\
        \ the Newton-Raphson method in 7D space-time.\n\nMathematical Foundation:\n\
        \    R(a) = ∇·(κ(|a|)∇a) + k₀²χ(|a|)a - s\n    where κ(|a|) = κ₀ + κ₂|a|²\
        \ and χ(|a|) = χ' + iχ''(|a|).\n\nArgs:\n    envelope (np.ndarray): Current\
        \ envelope estimate a(x,φ,t).\n    source (np.ndarray): Source term s(x,φ,t).\n\
        \nReturns:\n    np.ndarray: Residual r = L(a) - s."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 3
          type: Any
      returns: None
    get_solver_parameters:
      description: "Get solver parameters.\n\nPhysical Meaning:\n    Returns the current\
        \ values of all solver parameters for\n    monitoring and analysis purposes.\n\
        \nReturns:\n    Dict[str, Any]: Dictionary containing solver parameters."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    solve_envelope:
      description: "Solve BVP envelope equation using Newton-Raphson method.\n\nPhysical\
        \ Meaning:\n    Solves the full BVP envelope equation for the envelope field\n\
        \    in space-time using iterative Newton-Raphson method for\n    nonlinear\
        \ terms.\n\nMathematical Foundation:\n    Implements Newton-Raphson iteration:\n\
        \    1. Compute residual R = F(a) - s\n    2. Compute Jacobian J = ∂F/∂a\n\
        \    3. Solve J·δa = -R\n    4. Update a ← a - δa\n    5. Repeat until ||R||\
        \ < tolerance\n\nArgs:\n    source (np.ndarray): Source term s(x,φ,t).\n \
        \   initial_guess (Optional[np.ndarray]): Initial guess for solution.\n\n\
        Returns:\n    np.ndarray: Envelope solution a(x,φ,t).\n\nRaises:\n    ValueError:\
        \ If source has incompatible shape with domain."
      parameters:
        initial_guess:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 2
          type: Any
      returns: None
    solve_linear_system:
      description: "Solve linear system for Newton-Raphson update.\n\nPhysical Meaning:\n\
        \    Solves the linear system J·δa = -r for the Newton-Raphson\n    update\
        \ δa, where J is the Jacobian and R is the residual.\n\nMathematical Foundation:\n\
        \    Solves J·δa = -r for the correction vector δa.\n\nArgs:\n    jacobian\
        \ (np.ndarray): Jacobian matrix J.\n    residual (np.ndarray): Residual vector\
        \ r.\n\nReturns:\n    np.ndarray: Update vector δa."
      parameters:
        jacobian:
          description: Параметр 2
          type: Any
        residual:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    validate_solution:
      description: "Validate envelope equation solution.\n\nPhysical Meaning:\n  \
        \  Validates that the solution satisfies the envelope equation\n    within\
        \ the specified tolerance by computing the residual.\n\nMathematical Foundation:\n\
        \    Computes residual R = ∇·(κ(|a|)∇a) + k₀²χ(|a|)a - s\n    and checks that\
        \ ||R|| / ||s|| < tolerance.\n\nArgs:\n    solution (np.ndarray): Envelope\
        \ solution a(x,φ,t).\n    source (np.ndarray): Source term s(x,φ,t).\n   \
        \ tolerance (float): Relative tolerance for validation.\n\nReturns:\n    Dict[str,\
        \ Any]: Validation results including:\n        - is_valid: Whether solution\
        \ is valid\n        - residual_norm: L2 norm of residual\n        - relative_error:\
        \ Relative error\n        - max_error: Maximum error"
      parameters:
        self:
          description: Параметр 1
          type: Any
        solution:
          description: Параметр 2
          type: Any
        source:
          description: Параметр 3
          type: Any
        tolerance:
          description: Параметр 4
          type: Any
      returns: None
