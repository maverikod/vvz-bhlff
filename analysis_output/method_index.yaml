      description: "Validate the computed solution.\n\nPhysical Meaning:\n    Validates\
        \ the accuracy of the computed solution by\n    checking how well it satisfies\
        \ the original equation\n    and computing quality metrics.\n\nArgs:\n   \
        \ solution (np.ndarray): Computed solution field.\n    source (np.ndarray):\
