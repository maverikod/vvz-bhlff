        \nMathematical Foundation:\n    Energy is E = ½(μ⟨a,(-Δ)^β a⟩ + λ|∇a|²) -\
        \ ℜ⟨s,a⟩\n    for the fractional Riesz operator according to 7D BVP theory.\n\
        \nArgs:\n    field (np.ndarray): Field configuration a(x).\n\nReturns:\n \
