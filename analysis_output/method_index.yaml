    compute_impedance:
      description: "Compute impedance/admittance from BVP envelope.\n\nPhysical Meaning:\n\
        \    Calculates Y(ω), R(ω), T(ω), and peaks {ω_n,Q_n}\n    from the BVP envelope\
        \ at boundaries.\n\nMathematical Foundation:\n    Computes boundary functions\
        \ from BVP envelope:\n    - Admittance: Y(ω) = I(ω)/V(ω)\n    - Reflection:\
        \ R(ω) = |r(ω)|²\n    - Transmission: T(ω) = |t(ω)|²\n    - Resonances: {ω_n,Q_n}\
        \ from spectral analysis\n\nArgs:\n    envelope (np.ndarray): BVP envelope\
        \ a(x) to analyze.\n\nReturns:\n    Dict[str, Any]: Impedance calculation\
        \ results including:\n        - admittance: Y(ω) frequency response\n    \
        \    - reflection: R(ω) reflection coefficients\n        - transmission: T(ω)\
        \ transmission coefficients\n        - resonances: {ω_n,Q_n} resonance frequencies\
        \ and Q-factors"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    detect_quenches:
      description: "Detect quench events when local thresholds are reached.\n\nPhysical\
        \ Meaning:\n    Identifies when BVP dissipatively \"dumps\" energy into\n\
        \    the medium at local thresholds (amplitude/detuning/gradient).\n\nMathematical\
        \ Foundation:\n    Applies three threshold criteria:\n    - amplitude: |A|\
        \ > |A_q|\n    - detuning: |ω - ω_0| > Δω_q\n    - gradient: |∇A| > |∇A_q|\n\
        \nArgs:\n    envelope (np.ndarray): BVP envelope a(x) to analyze.\n\nReturns:\n\
        \    Dict[str, Any]: Quench detection results including:\n        - quench_locations:\
