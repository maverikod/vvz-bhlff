      description: "Forward Euler step.\n\nPhysical Meaning:\n    Implements forward\
        \ Euler time integration for BVP-modulated\n    evolution with first-order\
        \ accuracy.\n\nMathematical Foundation:\n    Euler scheme:\n    a_new = a\
        \ + dt * F(a, t)\n\nArgs:\n    field (np.ndarray): Current field configuration.\n\
        \    dt (float): Time step size.\n    evolution_func: Function computing evolution\
        \ terms.\n\nReturns:\n    np.ndarray: Field at next time step."
      parameters:
        dt:
          description: Параметр 3
          type: Any
        evolution_func:
          description: Параметр 4
