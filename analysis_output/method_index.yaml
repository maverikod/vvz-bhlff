      description: "Compute growth of static core energy in 7D space-time.\n\nPhysical\
        \ Meaning:\n    Computes the growth of static core energy in 7D space-time\
        \ M₇,\n    representing the energy stored in the core region of the BVP field.\n\
        \    This includes contributions from all 7 dimensions according to\n    the\
        \ 7D phase field theory.\n\nMathematical Foundation:\n    The core energy\
        \ growth in 7D is computed as:\n    E_core = ∫_core (1/2)[f_φ²|∇_xΘ|² + f_φ²|∇_φΘ|²\
        \ + β₄(ΔΘ)² + γ₆|∇Θ|⁶ + ...] dV₇\n    where Θ is the 7D phase vector, f_φ\
        \ is the phase field constant,\n    and the integral includes all 7 dimensions.\n\
        \nArgs:\n    envelope (np.ndarray): 7D envelope field with shape\n       \
        \ (N_x, N_y, N_z, N_φ₁, N_φ₂, N_φ₃, N_t)\n\nReturns:\n    float: Computed\
        \ core energy growth in 7D space-time."
      parameters:
