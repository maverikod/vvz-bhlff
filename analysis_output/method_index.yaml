        \ energy dumping events in the phase field.\n\nArgs:\n    domain (Domain):\
        \ Computational domain.\n    energy_threshold (float): Energy change threshold\
        \ for quench detection.\n    rate_threshold (float): Rate of change threshold.\n\
        \    magnitude_threshold (float): Field magnitude threshold."
