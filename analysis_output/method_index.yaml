  GradientComputer:
    compute_curl:
      description: "Compute curl of gradient field.\n\nPhysical Meaning:\n    Computes\
        \ the curl of the gradient field,\n    representing rotational flow patterns.\n\
        \nMathematical Foundation:\n    ∇×v = (∂v_z/∂y - ∂v_y/∂z, ∂v_x/∂z - ∂v_z/∂x,\
        \ ∂v_y/∂x - ∂v_x/∂y)\n\nArgs:\n    gradients (np.ndarray): Gradient field\n\
        \nReturns:\n    np.ndarray: Curl field"
      parameters:
        gradients:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_divergence:
      description: "Compute divergence of gradient field.\n\nPhysical Meaning:\n \
        \   Computes the divergence of the gradient field,\n    representing sources\
        \ and sinks in the flow.\n\nMathematical Foundation:\n    ∇·v = ∂v_x/∂x +\
        \ ∂v_y/∂y + ∂v_z/∂z\n\nArgs:\n    gradients (np.ndarray): Gradient field\n\
        \nReturns:\n    np.ndarray: Divergence field"
      parameters:
