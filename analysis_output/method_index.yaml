  ResonanceOptimization:
    __init__:
      description: "Initialize resonance optimizer.\n\nPhysical Meaning:\n    Sets\
        \ up the optimizer with BVP constants for\n    resonance quality factor optimization.\n\
        \nArgs:\n    constants (BVPConstants): BVP constants instance."
      parameters:
        constants:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _advanced_lorentzian_fitting:
      description: "Perform advanced Lorentzian fitting.\n\nPhysical Meaning:\n  \
        \  Performs advanced Lorentzian fitting to extract accurate\n    resonance\
        \ parameters, including amplitude, center frequency,\n    and full width at\
        \ half maximum (FWHM).\n\nMathematical Foundation:\n    Fits a Lorentzian\
        \ function to the resonance peak:\n    L(f) = A / (1 + ((f - f0) / (FWHM/2))^2)\
        \ + baseline\n    where A is amplitude, f0 is center frequency, and FWHM is\
        \ width.\n\nArgs:\n    peak_region (Dict[str, np.ndarray]): Peak region data.\n\
        \nReturns:\n    Dict[str, float]: Advanced fitting parameters."
      parameters:
        peak_region:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _calculate_optimized_quality_factor:
      description: "Calculate optimized quality factor.\n\nPhysical Meaning:\n   \
        \ Calculates the optimized quality factor from advanced\n    fitting parameters,\
        \ applying corrections for noise\n    and other systematic effects.\n\nMathematical\
        \ Foundation:\n    Q = f_center / FWHM_optimized\n    where FWHM_optimized\
        \ includes noise corrections.\n\nArgs:\n    params (Dict[str, float]): Advanced\
        \ fitting parameters.\n\nReturns:\n    float: Optimized quality factor."
      parameters:
        params:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    _extract_peak_region:
      description: "Extract region around a resonance peak.\n\nPhysical Meaning:\n\
        \    Extracts a localized region around a resonance peak for\n    detailed\
        \ analysis, ensuring sufficient data for accurate\n    optimization while\
        \ avoiding interference from nearby peaks.\n\nArgs:\n    frequencies (np.ndarray):\
        \ Frequency array.\n    magnitude (np.ndarray): Magnitude response array.\n\
        \    peak_idx (int): Index of the resonance peak.\n\nReturns:\n    Dict[str,\
        \ np.ndarray]: Peak region data."
      parameters:
        frequencies:
          description: Параметр 2
          type: Any
        magnitude:
          description: Параметр 3
          type: Any
        peak_idx:
          description: Параметр 4
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    optimize_quality_factors:
      description: "Optimize quality factors using advanced fitting techniques.\n\n\
        Physical Meaning:\n    Optimizes quality factors using advanced fitting techniques\n\
        \    to improve accuracy and reliability of resonance analysis\n    for BVP\
        \ impedance characterization.\n\nMathematical Foundation:\n    Uses advanced\
        \ Lorentzian fitting with parameter optimization\n    to extract accurate\
        \ quality factors from resonance peaks.\n\nArgs:\n    frequencies (np.ndarray):\
        \ Frequency array.\n    magnitude (np.ndarray): Magnitude response array.\n\
        \    peak_indices (List[int]): List of peak indices.\n\nReturns:\n    List[float]:\
        \ Optimized quality factors."
      parameters:
        frequencies:
          description: Параметр 2
          type: Any
        magnitude:
          description: Параметр 3
          type: Any
        peak_indices:
          description: Параметр 4
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
