    _compute_boundary_conditions:
      description: "Compute boundary pressure/stiffness.\n\nPhysical Meaning:\n  \
        \  Computes the boundary pressure and stiffness conditions set by\n    the\
        \ BVP field. These conditions represent the effective boundary\n    constraints\
        \ imposed by the renormalized core.\n\nMathematical Foundation:\n    The boundary\
        \ conditions are computed from the envelope amplitude\n    and its gradients,\
        \ representing the pressure and stiffness\n    characteristics at the boundaries.\n\
        \nArgs:\n    envelope (np.ndarray): 7D envelope field.\n\nReturns:\n    Dict[str,\
        \ float]: Dictionary containing:\n        - boundary_pressure: Boundary pressure\
        \ condition\n        - boundary_stiffness: Boundary stiffness condition"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _compute_effective_coefficients:
      description: "Compute effective renormalized coefficients.\n\nPhysical Meaning:\n\
        \    Computes the renormalized coefficients c_i^eff(|A|,|∇A|) from\n    the\
        \ envelope amplitude and gradients. These coefficients represent\n    the\
        \ effective parameters of the core after renormalization by\n    the BVP field.\n\
        \nMathematical Foundation:\n    The renormalized coefficients are computed\
        \ as:\n    c_i^eff = c_i + α_i|A|² + β_i|∇A|²/ω₀²\n    where α_i and β_i are\
        \ renormalization parameters.\n\nArgs:\n    envelope (np.ndarray): 7D envelope\
        \ field.\n\nReturns:\n    Dict[str, float]: Dictionary containing:\n     \
        \   - c2_eff: Renormalized c₂ coefficient\n        - c4_eff: Renormalized\
        \ c₄ coefficient\n        - c6_eff: Renormalized c₆ coefficient"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    apply:
      description: "Apply Core Renormalization postulate.\n\nPhysical Meaning:\n \
        \   Validates core renormalization by computing effective coefficients\n \
        \   and boundary conditions from the BVP envelope. This ensures that\n   \
        \ the core exhibits proper energy minimization with renormalized\n    coefficients\
        \ and appropriate boundary conditions.\n\nMathematical Foundation:\n    Computes\
        \ the effective renormalized coefficients c_i^eff(|A|,|∇A|)\n    from the\
        \ envelope amplitude and gradients, and calculates the\n    boundary pressure/stiffness\
        \ conditions.\n\nArgs:\n    envelope (np.ndarray): 7D envelope field to validate.\n\
        \        Shape: (N_x, N_y, N_z, N_φx, N_φy, N_φz, N_t)\n\nReturns:\n    Dict[str,\
        \ Any]: Validation results including:\n        - postulate_satisfied (bool):\
        \ Whether postulate is satisfied\n        - effective_coefficients (Dict):\
        \ Renormalized coefficients\n        - boundary_conditions (Dict): Boundary\
        \ pressure/stiffness\n        - renormalization_valid (bool): Whether renormalization\
        \ is valid\n        - renormalization_threshold (float): Applied threshold"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
