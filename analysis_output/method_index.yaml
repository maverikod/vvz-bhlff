        \ dominant\n    frequency component. Validates that this frequency matches\
        \ the\n    expected carrier frequency within tolerance.\n\nArgs:\n    envelope\
        \ (np.ndarray): 7D envelope field to validate.\n        Shape: (N_x, N_y,\
