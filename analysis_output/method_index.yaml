    __repr__:
      description: String representation of residual computer.
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: str
    _compute_div_kappa_grad:
      decorators:
      - abstractmethod
      description: "Compute divergence of kappa times gradient.\n\nPhysical Meaning:\n\
        \    Computes the divergence of κ times the gradient of the envelope\n   \
        \ using appropriate finite difference methods for the domain type.\n\nMathematical\
        \ Foundation:\n    Computes ∇·(κ∇a) = ∂/∂x(κ∂a/∂x) + ∂/∂y(κ∂a/∂y) + ∂/∂z(κ∂a/∂z)\
        \ +\n                      ∂/∂φ₁(κ∂a/∂φ₁) + ∂/∂φ₂(κ∂a/∂φ₂) + ∂/∂φ₃(κ∂a/∂φ₃)\
        \ +\n                      ∂/∂t(κ∂a/∂t)\n    using appropriate finite differences\
        \ for the domain.\n\nArgs:\n    envelope (np.ndarray): Envelope field in 7D\
        \ space-time.\n    kappa (np.ndarray): Nonlinear stiffness in 7D space-time.\n\
        \nReturns:\n    np.ndarray: ∇·(κ∇a) term in 7D space-time."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        kappa:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _setup_parameters:
      decorators:
      - abstractmethod
      description: "Setup envelope equation parameters.\n\nPhysical Meaning:\n   \
        \ Initializes the parameters needed for computing residuals\n    of the envelope\
        \ equation, including stiffness and susceptibility\n    coefficients."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    analyze_residual_components:
      description: "Analyze components of the residual.\n\nPhysical Meaning:\n   \
        \ Analyzes the individual components of the residual to understand\n    the\
        \ relative contributions of different terms in the equation.\n\nArgs:\n  \
        \  envelope (np.ndarray): Current envelope solution.\n    source (np.ndarray):\
        \ Source term.\n    **kwargs: Additional arguments for specific implementations.\n\
        \nReturns:\n    Dict[str, Any]: Dictionary containing residual component analysis."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 3
          type: Any
      returns: None
    compute_residual:
      decorators:
      - abstractmethod
      description: "Compute residual of the envelope equation.\n\nPhysical Meaning:\n\
        \    Computes the residual R = ∇·(κ(|a|)∇a) + k₀²χ(|a|)a - s(x,φ,t)\n    for\
        \ the current envelope solution, representing how well\n    the solution satisfies\
        \ the equation.\n\nMathematical Foundation:\n    The residual measures how\
        \ well the current solution satisfies\n    the envelope equation and is used\
        \ in Newton-Raphson iterations.\n\nArgs:\n    envelope (np.ndarray): Current\
        \ envelope solution in 7D space-time.\n    source (np.ndarray): Source term\
        \ s(x,φ,t) in 7D space-time.\n\nReturns:\n    np.ndarray: Residual R = L(a)\
        \ - s in 7D space-time."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
        source:
          description: Параметр 3
          type: Any
      returns: None
    compute_residual_norm:
      description: "Compute norm of residual for convergence checking.\n\nPhysical\
        \ Meaning:\n    Computes the L2 norm of the residual vector for monitoring\n\
        \    convergence of the Newton-Raphson iterations.\n\nArgs:\n    residual\
        \ (np.ndarray): Residual vector.\n\nReturns:\n    float: L2 norm of the residual."
      parameters:
        residual:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
