  QuenchCharacteristics:
    __init__:
      description: "Initialize quench characteristics computer.\n\nPhysical Meaning:\n\
        \    Sets up the characteristics computer with the computational\n    domain\
        \ to compute quench event properties.\n\nArgs:\n    domain_7d (Domain7D):\
        \ 7D computational domain."
      parameters:
        domain_7d:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_7d_gradient_magnitude:
      description: "Compute 7D gradient magnitude of envelope field.\n\nPhysical Meaning:\n\
        \    Calculates the magnitude of the gradient in all 7 dimensions\n    (3\
        \ spatial + 3 phase + 1 temporal), representing the rate\n    of change of\
        \ the envelope field in 7D space-time.\n\nMathematical Foundation:\n    ∇A\
        \ = (∂A/∂x, ∂A/∂y, ∂A/∂z, ∂A/∂φ₁, ∂A/∂φ₂, ∂A/∂φ₃, ∂A/∂t)\n    |∇A| = √(Σ|∂A/∂xᵢ|²)\n\
        \    Uses finite differences to approximate partial derivatives.\n\nArgs:\n\
        \    envelope (np.ndarray): 7D envelope field.\n\nReturns:\n    np.ndarray:\
        \ Gradient magnitude field with same shape as envelope."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_center_of_mass:
      description: "Compute center of mass for a quench component.\n\nPhysical Meaning:\n\
        \    Calculates the center of mass of a quench component,\n    representing\
        \ the effective location of the quench event\n    in 7D space-time.\n\nMathematical\
        \ Foundation:\n    Center of mass = Σ(r_i * w_i) / Σ(w_i)\n    where r_i are\
        \ coordinates and w_i are weights (amplitudes).\n\nArgs:\n    component_mask\
        \ (np.ndarray): Binary mask of component.\n\nReturns:\n    Tuple[float, ...]:\
        \ 7D coordinates of center of mass."
      parameters:
        component_mask:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_detuning_strength:
      description: "Compute detuning strength for a component.\n\nPhysical Meaning:\n\
        \    Calculates the strength of a detuning quench event based on\n    the\
        \ maximum detuning within the component region.\n\nMathematical Foundation:\n\
        \    Detuning strength = max(|ω_local - ω_0|) within component\n    This represents\
        \ the peak frequency deviation in the quench region.\n\nArgs:\n    component_mask\
        \ (np.ndarray): Binary mask of component.\n    detuning (np.ndarray): Detuning\
        \ field.\n\nReturns:\n    float: Detuning strength."
      parameters:
        component_mask:
          description: Параметр 2
          type: Any
        detuning:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_gradient_strength:
      description: "Compute gradient strength for a component.\n\nPhysical Meaning:\n\
        \    Calculates the strength of a gradient quench event based on\n    the\
        \ maximum gradient magnitude within the component region.\n\nMathematical\
        \ Foundation:\n    Gradient strength = max(|∇A|) within component\n    This\
        \ represents the peak gradient magnitude in the quench region.\n\nArgs:\n\
        \    component_mask (np.ndarray): Binary mask of component.\n    gradient_magnitude\
        \ (np.ndarray): Gradient magnitude field.\n\nReturns:\n    float: Gradient\
        \ strength."
      parameters:
        component_mask:
          description: Параметр 2
          type: Any
        gradient_magnitude:
          description: Параметр 3
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_local_frequency:
      description: "Compute local frequency from phase evolution.\n\nPhysical Meaning:\n\
        \    Calculates the local frequency at each point in 7D space-time\n    by\
        \ analyzing the phase evolution of the envelope field.\n    This represents\
        \ the instantaneous frequency of the BVP field.\n\nMathematical Foundation:\n\
        \    ω_local = |dφ/dt| / dt\n    where φ is the phase of the envelope and\
        \ dt is the time step.\n    Uses finite differences to approximate the derivative.\n\
        \nArgs:\n    envelope (np.ndarray): 7D envelope field.\n\nReturns:\n    np.ndarray:\
        \ Local frequency field with same shape as envelope."
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_quench_strength:
      description: "Compute quench strength for a component.\n\nPhysical Meaning:\n\
        \    Calculates the strength of a quench event based on\n    the maximum amplitude\
        \ within the component region.\n\nMathematical Foundation:\n    Quench strength\
        \ = max(|A|) within component\n    This represents the peak field strength\
        \ in the quench region.\n\nArgs:\n    component_mask (np.ndarray): Binary\
        \ mask of component.\n    amplitude (np.ndarray): Amplitude field.\n\nReturns:\n\
        \    float: Quench strength."
      parameters:
        amplitude:
          description: Параметр 3
          type: Any
        component_mask:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
