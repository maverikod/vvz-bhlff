  QuenchThresholdComputer:
    __init__:
      description: "Initialize quench threshold computer.\n\nPhysical Meaning:\n \
        \   Sets up the threshold computer with the computational domain\n    to compute\
        \ physical thresholds based on domain properties\n    and theoretical principles.\n\
        \nArgs:\n    domain_7d (Domain7D): 7D computational domain."
      parameters:
        domain_7d:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_all_thresholds:
      description: "Compute all quench thresholds from physical principles.\n\nPhysical\
        \ Meaning:\n    Computes all quench thresholds (amplitude, detuning, gradient,\n\
        \    carrier frequency) based on the physical properties of the\n    BVP field\
        \ and theoretical framework.\n\nReturns:\n    Dict[str, float]: Dictionary\
        \ containing:\n        - amplitude_threshold: Amplitude threshold |A_q|\n\
        \        - detuning_threshold: Detuning threshold Δω_q\n        - gradient_threshold:\
        \ Gradient threshold |∇A_q|\n        - carrier_frequency: Carrier frequency\
        \ ω_0"
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_amplitude_threshold:
      description: "Compute amplitude threshold from field energy density.\n\nPhysical\
        \ Meaning:\n    Computes the amplitude threshold based on the energy density\n\
        \    of the BVP field. The threshold represents the critical\n    amplitude\
        \ where nonlinear effects become significant and\n    quench events are likely\
        \ to occur.\n\nMathematical Foundation:\n    A_q = √(2 * E_critical)\n   \
        \ where E_critical is the critical energy density for quench\n    formation,\
        \ derived from the theoretical framework.\n\nReturns:\n    float: Amplitude\
        \ threshold |A_q|."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_carrier_frequency:
      description: "Compute carrier frequency from domain properties.\n\nPhysical\
        \ Meaning:\n    Computes the carrier frequency based on the temporal\n   \
        \ characteristics of the BVP field. The carrier frequency\n    represents\
        \ the fundamental frequency of the BVP oscillations.\n\nMathematical Foundation:\n\
        \    ω_0 = 2π / T_characteristic\n    where T_characteristic is the characteristic\
        \ time scale\n    derived from the domain configuration.\n\nReturns:\n   \
        \ float: Carrier frequency ω_0."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_detuning_threshold:
      description: "Compute detuning threshold from frequency analysis.\n\nPhysical\
        \ Meaning:\n    Computes the detuning threshold based on the frequency\n \
        \   characteristics of the BVP field. The threshold represents\n    the critical\
        \ frequency deviation where detuning quenches\n    are likely to occur.\n\n\
        Mathematical Foundation:\n    Δω_q = α * ω_0\n    where α is a dimensionless\
        \ parameter derived from the\n    theoretical framework and ω_0 is the carrier\
        \ frequency.\n\nReturns:\n    float: Detuning threshold Δω_q."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: float
    compute_gradient_threshold:
      description: "Compute gradient threshold from field gradients.\n\nPhysical Meaning:\n\
        \    Computes the gradient threshold based on the gradient\n    characteristics\
        \ of the BVP field. The threshold represents\n    the critical gradient magnitude\
        \ where gradient quenches\n    are likely to occur.\n\nMathematical Foundation:\n\
        \    |∇A_q| = β * |A_0| / L_characteristic\n    where β is a dimensionless\
        \ parameter, A_0 is the characteristic\n    amplitude, and L_characteristic\
        \ is the characteristic length scale.\n\nReturns:\n    float: Gradient threshold\
        \ |∇A_q|."
      parameters:
        self:
          description: Параметр 1
          type: Any
      returns: float
