        \ Foundation:\n    Computes transition zone interface functions:\n    - Y_tr(ω,|A|)\
        \ = Y_0(ω) + Y_nl(|A|) - nonlinear admittance\n    - J_EM(ω;A) = f(A,∇A) -\
        \ EM current sources from envelope\n    - χ''(|A|) = χ''_0 + χ''_nl(|A|) -\
        \ loss map with quenches\n\nArgs:\n    envelope (np.ndarray): 7D envelope\
        \ field.\n\nReturns:\n    Dict[str, Any]: Transition zone interface data including:\n\
        \        - nonlinear_admittance (np.ndarray): Y_tr(ω,|A|) response\n     \
        \   - em_current_sources (np.ndarray): J_EM(ω;A) current sources\n       \
        \ - loss_map (np.ndarray): χ''(|A|) loss distribution\n        - input_admittance\
        \ (np.ndarray): Y_in from tail"
      parameters:
        envelope:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
