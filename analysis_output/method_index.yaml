        \    waves from the VBP envelope dynamics. The energy\n    is carried by the\
        \ envelope oscillations.\n\nMathematical Foundation:\n    Energy density ∝\
        \ (∂h/∂t)² + (∇h)²\n    where h is the strain tensor from envelope dynamics\n\
        \nArgs:\n    strain_tensor: Gravitational wave strain tensor (7D)\n\nReturns:\n\
        \    Wave energy density"
