      description: "Compute mode amplitude and phase.\n\nPhysical Meaning:\n    Computes\
        \ the amplitude and phase of the resonance mode\n    at the given frequency\
        \ from eigenvector analysis."
      parameters:
        frequency:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    _compute_quality_factor:
      description: "Compute quality factor for given frequency.\n\nPhysical Meaning:\n\
        \    Computes the quality factor Q = ω / (2 * Im(ω)) which\n    characterizes\
        \ the resonance sharpness and energy storage."
      parameters:
        frequency:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: float
    compare_with_numerical:
      description: "Compare with numerical simulation results.\n\nPhysical Meaning:\n\
        \    Compares ABCD model predictions with numerical simulation\n    results,\
        \ computing errors and validating the model accuracy.\n\nMathematical Foundation:\n\
        \    Computes various error metrics:\n    - Frequency errors: |ω_ABCD - ω_num|\
        \ / ω_num\n    - Quality factor errors: |Q_ABCD - Q_num| / Q_num\n    - Admittance\
        \ errors: |Y_ABCD - Y_num| / |Y_num|\n\nArgs:\n    numerical_results (Dict[str,\
        \ Any]): Numerical simulation results.\n\nReturns:\n    Dict[str, Any]: Comparison\
        \ results with error metrics."
      parameters:
        numerical_results:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    compute_system_admittance:
      description: "Compute total system admittance.\n\nPhysical Meaning:\n    Computes\
        \ the complex admittance Y(ω) = I(ω)/V(ω) of the\n    entire resonator chain,\
        \ representing the system's\n    response to external excitation.\n\nMathematical\
        \ Foundation:\n    Y(ω) = C(ω) / A(ω)\n    where T_total = [A B; C D] is the\
        \ system transmission matrix\n\nArgs:\n    frequency (float): Frequency ω\
        \ for admittance calculation.\n\nReturns:\n    complex: Complex admittance\
        \ Y(ω)."
      parameters:
        frequency:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: complex
    compute_transmission_matrix:
      description: "Compute 2x2 transmission matrix for given frequency.\n\nPhysical\
        \ Meaning:\n    Computes the overall transmission matrix T_total(ω) for the\n\
        \    entire resonator chain at frequency ω, representing the\n    system's\
        \ transmission properties.\n\nMathematical Foundation:\n    T_total = T_1\
        \ × T_2 × ... × T_N\n    where each T_ℓ is computed from layer properties\n\
        \nArgs:\n    frequency (float): Frequency ω for matrix computation.\n\nReturns:\n\
        \    np.ndarray: 2x2 transmission matrix [A B; C D]."
      parameters:
        frequency:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    find_resonance_conditions:
      description: "Find frequencies satisfying resonance conditions.\n\nPhysical\
        \ Meaning:\n    Finds all frequencies where det(T_total - I) = 0,\n    which\
        \ correspond to system resonance modes.\n\nMathematical Foundation:\n    Resonance\
        \ condition: det(T_total(ω) - I) = 0\n    This equation is solved numerically\
        \ over the frequency range.\n\nArgs:\n    frequency_range (Tuple[float, float]):\
        \ (ω_min, ω_max) range.\n\nReturns:\n    List[float]: List of resonance frequencies."
      parameters:
        frequency_range:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
    find_system_modes:
      description: "Find system resonance modes.\n\nPhysical Meaning:\n    Identifies\
        \ all system resonance modes in the given frequency\n    range, computing\
        \ their frequencies, quality factors, and\n    coupling properties.\n\nMathematical\
        \ Foundation:\n    For each resonance frequency ω_n:\n    - Quality factor:\
        \ Q_n = ω_n / (2 * Im(ω_n))\n    - Amplitude: |A_n| from eigenvector analysis\n\
        \    - Phase: arg(A_n) from eigenvector analysis\n\nArgs:\n    frequency_range\
        \ (Tuple[float, float]): Frequency range to search.\n\nReturns:\n    List[SystemMode]:\
        \ List of system resonance modes."
      parameters:
        frequency_range:
          description: Параметр 2
          type: Any
        self:
          description: Параметр 1
          type: Any
      returns: None
