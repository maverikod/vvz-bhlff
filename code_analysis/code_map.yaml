      \ < tolerance\n\nArgs:\n    source (np.ndarray): Source term s(x,φ,t).\n   \
      \ initial_guess (Optional[np.ndarray]): Initial guess for solution.\n\nReturns:\n\
      \    np.ndarray: Envelope solution a(x,φ,t).\n\nRaises:\n    ValueError: If\
      \ source has incompatible shape with domain."
