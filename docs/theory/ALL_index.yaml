  summary: 'Продолжение главы о законе масштаба. Формализуется понятие уровня как устойчивого гипердефекта с высокой степенью когерентности, собственной спектральной структурой и долгоживущими модами. Вводится строгий критерий уровня (когерентность, собственные моды, стационарность, иерархическая устойчивость). Классификация объектов: элементарная частица, планета, звезда, галактика — уровни; вещество, кластеры — ансамбли. Формализация когерентности через параметры Q (добротность), ε (параметр фрактальной дефектности), κ (жёсткость). Доказывается строгая лемма о том, почему ячейка не может быть уровнем. Условие существования уровня: ε_L << 1 и τ_coh >> τ_ext. Масса уровня определяется как энергия стационарного решения без массовых членов. Масштабирование работает только на уровнях, а не на ансамблях.'
