    огибающая) **Контекст.** В документе уже зафиксирована цепочка редукции:

    линейный предел «хвоста» и медленная огибающая приводят к уравнению Шрёдингера;

    спектр и ширины уровней задаются граничным условием Робина («операторный

    импеданс»). Ниже — строгая формулировка условий и оценки погрешности, а также

    самосопряжённость эффективного гамильтониана в замкнутом случае и

    диссипативность — в открытом.

