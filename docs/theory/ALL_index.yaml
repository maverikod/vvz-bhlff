  summary: 'Глава о кусочных функциях и "шипах" как следствии ячеек ВБП. Объяснение кусочности наблюдаемых явлений через проекцию гладкой ячеистой структуры ВБП. Гладкая основа: замороженные моды ВБП. Посадка материи на ячейки и возникновение негладкости. Граница ячейки как математический излом. Резонансное включение как "шип". Примеры: ламинарно-турбулентный переход, кривые скоростей галактик, протуберанцы и вспышки на Солнце, циклоны и ураганы, сейсмика, электрический пробой. Практическая формула Θ-подхода. Формальная математическая структура ячеек ВБП: факторизация по ячейкам, критерии, метрика, тензор переходов. Практические примеры операторов для ERA5, SPARC, CMB, Солнца, Земли. Алгоритмическая формулировка для ПО. Мультиуровневая структура ячеек от макроструктуры до протона. Единое уравнение всех видимых слоёв.'
