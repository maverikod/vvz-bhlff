  summary: 'Практическая глава по учёту внешних вкладов в расчёты SPARC: макрофона (Λ-ячейка, CMB), кластеров галактик и ближайших соседей. Формализуется разложение I_tot(R) = I_2^(gal)(R) + I_3^(cluster)(R) + I_4^(macro)(R) + Σ_j I_2^(nei_j)(R) и соответствующее разложение V_obs²(R) на вклады. Макрофон выделяется как общая низкочастотная компонента DCT-спектра, одинаковая для всех SPARC-галактик. Кластерный фон определяется через кластеры форм кривых (Cluster_0...Cluster_N) как средняя кривая и её низкочастотный спектр. Ближайшие соседи моделируются как локальные деформации в V(R) через локальные базисы. Ключевой критерий правильности подбора соседей — наличие биений в Θ-спектре: интерференция мод галактика↔сосед порождает квазистационарные огибающие (sidebands), которые должны совпадать с наблюдаемыми HF-пиками. Описывается обновлённый расчётный контур по SPARC, практический алгоритм реконструкции Θ-спектра, вычисления ожиданий по соседям и сравнения с наблюдаемыми биениями. Всё выражается через DCT-спектр Θ-поля, функционалы I_ℓ и Θ-лестницу уровней без гравитационных потенциалов.'
