  summary: "Теория ансамблей дефектов в Θ-ячейках. Принцип: ансамбль существует только внутри ячейки несущего дефекта. Объект физики: S ≡ (Defect_Λ; Cell(x,t); Σ(x,t); {D_i}), а не ({D_i}) в пустоте. Типология Θ-ячеек: сверхглубокие (вблизи дефекта, внутри ПЗ), плоские (bulk-режим), распадающиеся (дальний хвост), рождающиеся (резкий рост размеров), схлопывающиеся (резкое падение размеров). Карта среды: M(x,t) ≡ {L(x,t), U(x,t), Q(x,t), Π(x,t)}. Кластеры/ансамбли дефектов и квенчи как операторы, ограниченные режимом ячейки. Квенч — не шум, а переключение ступени: σ_n → Q[M,Σ] → σ_{n±1}. Фазовое состояние в терминах Θ-теории: S ≡ ({σ}, Π, Q, Σ-class, ν_Q). Мягкие и жёсткие столкновения. Неэкспоненциальные взаимодействия через геометрические процессы и связность, а не потенциалы вида exp(-r/ℓ). Динамические границы. Приложения: Земля (ядро-ПЗ-хвост, моды, циклоны, сейсмика, атмосфера, океан, материки, дрейф плит, полярная асимметрия), планеты (Венера, Марс, паспорта планет)."
