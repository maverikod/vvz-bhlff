  summary: "Строгая связь обмотки (S¹-компонента Θ-поля) с магнитным полем. Обмотка как фазовый вихревой модуль Θ-поля: для обмотки с числом перекрутов n имеем A = A₀ e^(inφ), фазовый ток j_φ порождает магнитное поле через вариационное уравнение. Строгая формула магнитного поля B(x) = μ_Θ ∫ (j_φ(x')×(x-x'))/|x-x'|³ d³x' - точный Θ-аналог уравнения Био-Савара. Объяснение наблюдаемых явлений: Уран наклонён (торовая структура наклонена, обмотка смещена, n≠0 дает квадрупольную доминанту), Марс почти без поля (обмотка отсутствует n=0), Земля имеет диполь (три тора симметричны, n=1), Солнце имеет реверсы (на фронте периодически меняется знак фазового наклона обмотки, n(t) меняет знак что эквивалентно реверсу B)."
