  summary: "Уточняет канон «уровень-дефект» vs «ансамбль» на примере связки ядро↔звезда↔галактика: уровень определяется когерентностью/замкнутостью (ε_L≪1, lock в ПЗ, подавление лавин квенчей, ненулевая передача через ступени ΠT). Даёт паспортные ассоциации по геометрии/спектру/квенчам и формулирует механизм синтеза уровня через «окно застёжки» (Δℒ↓, ν_Q↓, ∏T_ℓ↑, 𝔅>0 на Δt_*). Затем вводит каноническую симметричную лестницу агрегатных режимов (кристалл→жидкость→газ→плазма→ядро) как ступенчатую смену классов интерфейсов Σ и характеристик (Π, σ, Q, ν_Q), фиксируя, что максимум структурной сложности достигается перед плазмой."
