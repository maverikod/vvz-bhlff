  summary: 'Формальная реконструкция CMB-спектра из Θ-оператора. Θ-теория утверждает, что Λ-ячейка - первичный макро-резонатор, её собственные моды определяют крупномасштабную структуру поля, CMB - не остаточное излучение, а проекция Θ-мод Λ-ячейки на двумерную сферу наблюдения. Формальный оператор, переводящий Θ-моды в наблюдаемые мультиполи CMB: Θ-аналог первичного спектра P_Θ(ℓ,n) = |Ψ_ℓn^(Λ)|² = A_Λ ℓ^(-p(β_Λ)) f_n, оператор переноса Θ → наблюдаемое поле, строгая формула для C_ℓ, проверка основных CMB-фактов (наклон, квадруполь, аномалии) через Θ-спектр. Добавляются расширенные выкладки по связи Θ-оператора с фрактальной лестницей масштабов и явной зависимости C_ℓ от параметров Λ-ячейки и закона масштабов.'
