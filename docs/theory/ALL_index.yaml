  summary: 'Канонический модуль P*, выделенный из глав 7d-99 и 7d-100, который задаёт строгое определение дефекта уровня планеты/звезды и внешнего драйва. Фиксируется канон операторной динамики Θ-поля через набор {S,G,σ,ℚ,𝒞,𝓛_bulk} и событийные скачки состояния p(t_s^-)→p(t_s^+), вводится определение дефекта (ядро–ПЗ–хвост), принцип статичности поля дефекта, спектральное разложение по собственным модам, разложение отклика m a = F_drv + F_geo + F_med (геометрический вклад без работы, драйв как единственный источник времени, средовой член), роль ПЗ как оператора фильтрации и согласования. Отдельным разделом перечисляются “дыры” теории, подлежащие закрытию без введения новой физики (универсальный набор интерфейсов 𝓘, шаблон функционала устойчивости δ𝓕, лемма о связке “ПЗ ↔ квенч”, каталог неоформленных драйверов).'
