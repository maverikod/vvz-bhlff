  summary: 'Фундаментальная глава о гипердефекте как родительской сущности Λ-ячейки в Θ-иерархии. Вводится понятие гипердефекта как дефекта уровня выше Λ-ячейки, который не вводит новой физики, а лишь продолжает Θ-лестницу. Λ-ячейка трактуется как стационарный bulk-режим гипердефекта с локализацией нелинейности в переходной зоне Σ. На основе частотной лестницы Θ-уровней, связи длина–время–частота и параметра качества Q получаются оценки: добротности Q_Λ ~ 10^5 (из малости флуктуаций CMB δ ~ 10^-5), глубины режима Δ_Λ ~ Q_Λ, времени жизни T_life ~ Q_Λ H_0^-1 ~ 10^22 с ~ 10^14 лет. Динамика масштаба выводится из вариации действия на границе Σ через баланс потоков Φ_in и Φ_out. Формулируются четыре сценария эволюции: расширение, насыщение, сжатие, растворение. Устраняется необходимость в "тёмной энергии" как вакуумной плотности. Включает канонический раздел D7 об иерархии дефектов, корректировку понятия уровня (Λ-ячейка не является уровнем, а только bulk-режимом) и приложение D7"-A о перепривязке параметров к гипердефекту.'
