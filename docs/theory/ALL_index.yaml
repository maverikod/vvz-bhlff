  summary: 'Модель Солнца как трёхтрового Θ-дефекта звёздного уровня. Структура зон Солнца как мод трёх торов: ядро (T₁), радиативная зона (T₂), конвективная зона (T₃), корона и EM-трубки. Энергетический баланс и роль нейтрино. 11-летний цикл и "бабочка" в терминах мод. Связь с планетами. ТЗ для численной модели Солнца: входные данные, модельные переменные, задачи уровней, архитектура кода. Связь земных циклонов и солнечных пятен как проявлений одного механизма динамических ячеек ВБП.'
