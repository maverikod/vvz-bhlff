  summary: 'Фундаментальная глава по обратной спектральной задаче: восстановление геометрии резонаторов из наблюдаемых мод в рамках ВБП. ВБП стационарна и задаёт базовый класс операторов, моды являются собственными режимами резонаторов. Геометрия восстанавливается как резонаторная конструкция (набор слоёв, зон, параметров оператора). Формализуется постановка: данные наблюдения (частоты, добротности, расщепления, угловые паттерны), модель объекта как цепочки резонаторов (слои с параметрами Δr_i, β_i, μ_i, γ_i), граничные условия через адмиттанс Y(ω), регуляризованный функционал несоответствия. Ключевое разделение: первый поток (макро→микро) задаёт каркас геометрии (сферические резонаторные оболочки, линейные размеры, последовательность), второй поток (микро→макро) модулирует параметры резонатора без изменения каркаса. Применение к Земле (восстановление вложенных сферических резонаторов), галактикам (SPARC, поляризация, m=2 моды), CERN (предсказание минимумов в dσ/dt).'
