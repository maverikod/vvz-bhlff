  summary: 'Интерпретация микроволнового фона (CMB) в Θ-теории. CMB как стационарный фон Θ-поля, порождённый основной модой гигантской Λ-ячейки, а не "свет ранней Вселенной". Свойства CMB (однородность 10⁻⁵, анизотропии, чёрнотельный спектр, температура 2.725 K) как следствия геометрии резонатора. Связь уровней через атомный уровень как единственный фотонный адаптер: атомы - первый устойчивый объект, встроенный в резонатор всей лестницы, дискретный набор уровней жёстко зависит от фундаментальных констант (m_p, m_e, α, ℏ, c). Корреляция по лестнице уровней, а не напрямую: крупные углы ↔ Λ-ячейки/суперструктуры, средние ↔ скопления галактик, меньшие ↔ галактический уровень. Фрактальная лестница: дискретные этажи (протон → ядро → атом → звезда → галактика → кластер → Λ-ячейка) + фрактальная подструктура вокруг каждого этажа, лог-периодические отклонения, самоподобные под-пики. Анизотропная Λ-ячейка как резонатор: расширение по осям L_i(t), эффективные Хабблы H_i(t), связь с параметрами Θ-поля (жёсткость κ, фазовая скорость v_φ), нелинейность H(z) и анизотропии для дальних объектов, зависимость от направления наблюдения. Законы самоподобия Θ-лестницы: закон масштаба L_{n+1} = K* L_n (1 + a·ε_n)⁻¹, эволюция фрактальной поправки ε_{n+1} = λ·ε_n, связь добротности и фрактальности ε_n = Q_n⁻¹, устойчивый инвариант K* ≈ 35-50, циклы Θ-поля и скачки скорости фазы v_φ. Кластеры как ансамблевый уровень: анализ кластеров как следующего уровня после галактик, ε_cluster ≈ 0.0254, f_LP ≈ 0.028 (2.8%), ослабление Θ-подписи при переходе от дефекта к ансамблю. Корреляция CMB ↔ структура через угловой масштаб и лестницу уровней, многоуровневая и самоподобная связь, перекрывающиеся полосы вкладов разных этажей.'
