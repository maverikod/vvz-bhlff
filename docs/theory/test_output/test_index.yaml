- id: 7d-88
  category: 'Глава 7d-88. Аномалии CERN/TOTEM и их интерпретация в модели ВБП: протон
    как трёхтровый дефект'
  summary: 'Анализ аномальных наблюдений CERN/TOTEM при энергиях 7-13 ТэВ и их интерпретация
    в рамках модели ВБП. Три ключевые аномалии: 1) глубокий и сдвинутый минимум в
    дифференциальном сечении dσ/dt, интерпретируемый как интерференция двух ВБП-рифлёнок;
    2) аномально низкий ρ-параметр (0.09-0.12 вместо ожидаемых 0.14-0.16), указывающий
    на образование вторичной ячейки и резонанс мод торов; 3) отсутствие плато в малых
    t, подтверждающее трёхъядерную топологию протона с волновыми стенками. Перевод
    данных TOTEM в геометрические масштабы: наружный радиус протона R_outer ≈ 1.1-1.3
    фм, внутренний масштаб R_core ≈ 0.3 фм. Доказательство необходимости многорежимной
    модели (три тора) вместо одной моды. Подтверждение структуры протона как трёхтрового
    дефекта с переходной зоной и хвостом.'
