  category: Постулаты БВП (аксиоматика)
  summary: 'Новая постановка задачи Базовое Высокочастотное Поле Согласен: БВП — это
    не

    «клей», а базис всей конструкции, включая ядро. Ниже — компактный, но полный

    концепт: **постулаты БВП → следствия → как это внедрить в решалки хвоста, ПЗ и

    ядра**. 1. **Примат носителя.** Реальная конфигурация — это модуляции

    высокочастотного носителя (БВП). Все наблюдаемые «моды» — его огибающие и

    биения. 2. **Разделение масштабов.** Существует малый параметр : — частота БВП;

    — характерные частоты огибающей/реакции среды.

