- id: 7d-01
  category: General
  summary: '2. **Связность:** фазовая скорость берётся **на 10–15 порядков выше **,
    если

    нужна практически мгновенная корреляция по всему . 3. **Жёсткость:** выбираем

    так, чтобы экстремальные астрофизические «источники» давали **мелкие** по

    оценкам сверху (условия уровня B). 4. **Баланс:** проверяем виреальные

    соотношения и кривизну — это быстрый тест, что система не «схлопывается» и не

    «разрывается». 5. **Интерпретация:** ЧД, сверхновые, даже «большие взрывы» —

    **локальные/эпохальные модуляции** на сверхжёстком фазовом фоне; разрывов поля

    нет.

    '
