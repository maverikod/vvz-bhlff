  summary: '# ТЗ: 3D-модуль «Waves-BVP» (высокочастотное базовое поле как каркас

    устойчивости) * Рассчитать **стационарную 3D-картину огибающей**

    высокочастотного базового поля (БВП) как **каркаса устойчивости**, с поддержкой:

    * сферических зон сжатия/разрежения и их **затухающей интерференции**

    (“лоскутное одеяло”: кластеры/воиды); * **квенчей** (локальные пороговые

    увеличения потерь); * **граничной адмиттансы** , резонансов для стыковки с

    Переходной зоной и Хвостом;

