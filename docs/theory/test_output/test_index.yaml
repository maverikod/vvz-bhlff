- id: 7d-15
  category: Глава X. Запутанность и фазовая когерентность
  summary: 'Фазовая согласованность распространяется со скоростью , а материальная

    перестройка ядра (перенос энергии/импульса) ограничена . Конфигурация частицы:

    ядро (топологический дефект), переходная зона (баланс сжатие–разрежение), хвост

    — линейное волновое решение на “дальней зоне”. Масса — энергия стационара;

    массовых членов в нет. Пусть — линейная огибающая хвоста, получаемая редукцией

    уравнений поля во внешней области. Её влияние на локальные наблюдаемые в

    подобласти задаётся **граничным функционалом**

